<!DOCTYPE html>
<!-- 財務管理工具 v2.0 | 2026-03-20 | 純HTML重寫，手機優先 -->
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>財務管理 v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--bg2:#ecedf2;--bg3:#e2e4eb;
  --card:#fff;--card2:#f7f8fb;
  --border:#d8dae4;--border2:#c8cad8;
  --text:#1a1c2e;--text2:#5a5c78;--text3:#9a9cb8;
  --accent:#5b4fd4;--accent2:#7c6af0;
  --green:#0a8a68;--green-bg:#e8f7f2;
  --red:#d03060;--red-bg:#fdf0f4;
  --amber:#c47a00;--amber-bg:#fdf6e6;
  --blue:#2060c0;--blue-bg:#eff4ff;
  --r:12px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;font-size:15px}
.mono{font-family:'JetBrains Mono',monospace}
input,select,textarea{
  font-family:'Noto Sans TC',sans-serif;font-size:16px;
  background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);
  border-radius:10px;padding:12px 14px;width:100%;outline:none;
  transition:border .15s;-webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff}
textarea{resize:vertical;min-height:72px}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;transition:all .15s;min-height:44px;padding:0 18px}
.btn{background:var(--card2);color:var(--text2);border:1.5px solid var(--border2)}
.btn:active{opacity:.75}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1.5px solid rgba(10,138,104,.25)}
.btn-red{background:var(--red-bg);color:var(--red);border:1.5px solid rgba(208,48,96,.25)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1.5px solid rgba(196,122,0,.25)}
.btn-sm{min-height:34px;padding:0 12px;font-size:12px;border-radius:8px}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px}
label{font-size:13px;color:var(--text2);font-weight:600;display:block;margin-bottom:6px}
.fg{margin-bottom:16px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-purple{background:rgba(91,79,212,.1);color:var(--accent)}
.divider{height:1px;background:var(--border);margin:12px 0}

/* Page */
.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--card);border-top:1.5px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:6px 4px;min-height:62px;font-family:'Noto Sans TC',sans-serif;color:var(--text3)}
.nav-btn.active{color:var(--accent)}
.nav-btn .ni{font-size:20px;line-height:1}
.nav-btn .nl{font-size:10px;font-weight:600}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-footer{display:flex;gap:10px;margin-top:18px}
.modal-footer button{flex:1}

/* Toast */
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.kpi.full{grid-column:1/-1}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi.green{border-color:rgba(10,138,104,.3);background:var(--green-bg)}
.kpi.red{border-color:rgba(208,48,96,.25)}
.kpi.amber{border-color:rgba(196,122,0,.25)}

/* Transaction rows */
.tx-list{display:flex;flex-direction:column;gap:6px}
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:border .15s}
.tx-row:active{border-color:var(--accent)}
.tx-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--bg3)}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--text3);margin-top:2px}
.tx-amount{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;flex-shrink:0}
.tx-amount.neg{color:var(--red)}
.tx-amount.pos{color:var(--green)}

/* Month filter */
.month-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.month-scroll::-webkit-scrollbar{display:none}
.month-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text2);border:1.5px solid transparent;cursor:pointer;white-space:nowrap;min-height:36px}
.month-btn.active{background:var(--accent);color:#fff}

/* Budget bar */
.budget-item{margin-bottom:14px}
.budget-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.budget-bar{height:8px;border-radius:4px;background:var(--accent);transition:width .3s}
.budget-bar.warn{background:var(--amber)}
.budget-bar.over{background:var(--red)}

/* CC card */
.cc-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.cc-name{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cc-bar-bg{height:6px;background:var(--bg3);border-radius:3px;margin:10px 0 6px}
.cc-bar{height:6px;border-radius:3px;background:var(--accent);transition:width .3s}
.cc-bar.warn{background:var(--amber)}
.cc-bar.over{background:var(--red)}

/* List row */
.list-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px}
.list-info{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:600}
.list-meta{font-size:12px;color:var(--text3);margin-top:2px}

/* Section header */
.sec-hd{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin:18px 0 10px;text-transform:uppercase}

/* Debt */
.debt-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px}
.debt-row.settled{opacity:.45}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- Pages -->
<div class="page active" id="page-dashboard"></div>
<div class="page" id="page-tx"></div>
<div class="page" id="page-budget"></div>
<div class="page" id="page-cards"></div>
<div class="page" id="page-subs"></div>
<div class="page" id="page-debts"></div>
<div class="page" id="page-planned"></div>
<div class="page" id="page-income"></div>
<div class="page" id="page-accounts"></div>
<div class="page" id="page-settings"></div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goto('dashboard')" id="nb-dashboard"><span class="ni">◈</span><span class="nl">總覽</span></button>
  <button class="nav-btn" onclick="goto('tx')" id="nb-tx"><span class="ni">⟳</span><span class="nl">記帳</span></button>
  <button class="nav-btn" onclick="goto('budget')" id="nb-budget"><span class="ni">◎</span><span class="nl">預算</span></button>
  <button class="nav-btn" onclick="goto('cards')" id="nb-cards"><span class="ni">▣</span><span class="nl">信用卡</span></button>
  <button class="nav-btn" onclick="goto('more')" id="nb-more"><span class="ni">⋯</span><span class="nl">更多</span></button>
</nav>

<!-- More menu overlay -->
<div class="overlay" id="moreMenu" onclick="if(event.target===this)closeMore()">
  <div class="modal" style="padding-bottom:80px">
    <div class="modal-handle"></div>
    <div class="modal-title">更多功能</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('subs')">⊛ 訂閱</button>
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('debts')">⇌ 代墊/借貸</button>
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('planned')">◷ 計劃支出</button>
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('income')">↑ 收入</button>
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('accounts')">◉ 帳戶</button>
      <button class="btn" style="height:64px;font-size:14px" onclick="closeMore();goto('settings')">⚙ 設定</button>
    </div>
  </div>
</div>

<!-- Add Transaction Modal -->
<div class="overlay" id="txOverlay" onclick="if(event.target===this)closeModal('txOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="txModalTitle">新增記帳</div>
    <input type="hidden" id="txEditId">
    <div class="fg">
      <label>日期</label>
      <input type="date" id="txDate">
    </div>
    <div class="fg">
      <label>金額</label>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-sm" id="txTypeExpense" onclick="setTxType('expense')" style="flex:1;background:var(--red-bg);color:var(--red);border-color:rgba(208,48,96,.3)">支出</button>
        <button class="btn btn-sm" id="txTypeIncome" onclick="setTxType('income')" style="flex:1">收入</button>
      </div>
      <input type="number" id="txAmount" placeholder="0" inputmode="decimal">
    </div>
    <div class="fg">
      <label>分類</label>
      <select id="txCategory" onchange="updateSubcats()"></select>
    </div>
    <div class="fg" id="txSubcatFg">
      <label>子分類</label>
      <select id="txSubcat"></select>
    </div>
    <div class="fg">
      <label>付款方式</label>
      <select id="txPay"></select>
    </div>
    <div class="fg">
      <label>備注</label>
      <input type="text" id="txNote" placeholder="說明...">
    </div>
    <div class="modal-footer">
      <button class="btn" id="txDeleteBtn" style="display:none" onclick="deleteTx()">刪除</button>
      <button class="btn" onclick="closeModal('txOverlay')">取消</button>
      <button class="btn-primary" onclick="saveTx()">儲存</button>
    </div>
  </div>
</div>

<!-- Generic Confirm Modal -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirmTitle">確認</div>
    <div id="confirmMsg" style="font-size:14px;color:var(--text2);margin-bottom:8px"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('confirmOverlay')">取消</button>
      <button class="btn-red" id="confirmOkBtn">確定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════
// DATA
// ═══════════════════════════
const KEY = 'finance_v2';
function defDB(){
  return {
    accounts:[
      {id:'acc1',name:'玉山銀行',balance:50000,icon:'🏦'},
      {id:'acc2',name:'郵局',balance:15000,icon:'📮'},
      {id:'acc3',name:'現金',balance:3000,icon:'💵'},
    ],
    creditCards:[
      {id:'cc1',name:'玉山卡',limit:50000,billingDay:25,payDay:15,color:'#5b4fd4'},
      {id:'cc2',name:'國泰卡',limit:30000,billingDay:20,payDay:10,color:'#0a8a68'},
    ],
    transactions:[],
    subscriptions:[
      {id:'sub1',name:'Netflix',amount:270,day:15,ccId:'cc1',category:'娛樂',active:true},
      {id:'sub2',name:'Spotify',amount:149,day:1,ccId:'cc1',category:'娛樂',active:true},
    ],
    debtRecords:[],
    budgets:[
      {id:'b1',category:'餐飲',monthlyLimit:5000,color:'#f472b6'},
      {id:'b2',category:'購物',monthlyLimit:3000,color:'#fbbf24'},
      {id:'b3',category:'娛樂',monthlyLimit:1500,color:'#60a5fa'},
      {id:'b4',category:'交通',monthlyLimit:2000,color:'#34d399'},
    ],
    plannedExpenses:[],
    incomeHistory:[],
    categories:{
      '餐飲':{icon:'🍜',subs:['早餐','午餐','晚餐','宵夜','飲料','聚餐']},
      '購物':{icon:'🛍️',subs:['衣物','日用品','3C','其他']},
      '交通':{icon:'🚗',subs:['機車','大眾運輸','計程車','停車']},
      '娛樂':{icon:'🎮',subs:['電影','遊戲','旅遊','其他']},
      '貓咪':{icon:'🐱',subs:['飼料','醫療','玩具','其他']},
      '學校':{icon:'📚',subs:['課程費','書籍','文具','均攤費用']},
      '醫療':{icon:'💊',subs:['掛號','藥品','健檢']},
      '居家':{icon:'🏠',subs:['房租','水電','維修']},
      '收入':{icon:'💰',subs:['薪資','兼職','獎金','找零','其他']},
      '其他':{icon:'📌',subs:['其他']},
    },
    settings:{currency:'NT$',savingsGoal:100000},
  };
}
let db = (() => { try{ return JSON.parse(localStorage.getItem(KEY)) || defDB(); } catch{ return defDB(); } })();
function save(){ localStorage.setItem(KEY, JSON.stringify(db)); }

// ═══════════════════════════
// UTILS
// ═══════════════════════════
const uid = () => '_'+Math.random().toString(36).slice(2,8);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const today = () => new Date().toISOString().slice(0,10);
const curMonth = () => today().slice(0,7);
const fmt = n => { const a=Math.abs(n); const s=a>=10000?(a/10000).toFixed(1)+'萬':a.toLocaleString(); return (n<0?'-':'')+'NT$'+s; };
const fmtFull = n => (n<0?'-NT$':'NT$')+Math.abs(n).toLocaleString();
function daysUntil(dayOfMonth){
  const t=new Date(); let d=new Date(t.getFullYear(),t.getMonth(),dayOfMonth);
  if(d<=t) d=new Date(t.getFullYear(),t.getMonth()+1,dayOfMonth);
  return Math.ceil((d-t)/(1000*60*60*24));
}
function ccUsed(ccId){
  const cc=db.creditCards.find(c=>c.id===ccId); if(!cc)return 0;
  const t=new Date(); let cycleStart=new Date(t.getFullYear(),t.getMonth(),cc.billingDay);
  if(t.getDate()<cc.billingDay) cycleStart=new Date(t.getFullYear(),t.getMonth()-1,cc.billingDay);
  return db.transactions.filter(tx=>tx.ccId===ccId&&tx.amount<0&&new Date(tx.date)>=cycleStart).reduce((s,tx)=>s+Math.abs(tx.amount),0);
}
function thisMonthTx(){ return db.transactions.filter(t=>t.date.startsWith(curMonth())); }
function thisMonthSpend(){ return thisMonthTx().filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0); }
function thisMonthIncome(){ return thisMonthTx().filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0); }
function catIcon(name){ return db.categories[name]?.icon||'📌'; }
function toast(msg,dur=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }

// ═══════════════════════════
// NAV
// ═══════════════════════════
let activePage = 'dashboard';
function goto(id){
  if(id==='more'){ document.getElementById('moreMenu').classList.add('open'); return; }
  activePage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+id); if(nb) nb.classList.add('active');
  renderPage(id);
  window.scrollTo(0,0);
}
function closeMore(){ document.getElementById('moreMenu').classList.remove('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function openModal(id){ document.getElementById(id).classList.add('open'); }

// ═══════════════════════════
// RENDER PAGES
// ═══════════════════════════
function renderPage(id){
  const pages = {
    dashboard: renderDashboard,
    tx: renderTx,
    budget: renderBudget,
    cards: renderCards,
    subs: renderSubs,
    debts: renderDebts,
    planned: renderPlanned,
    income: renderIncome,
    accounts: renderAccounts,
    settings: renderSettings,
  };
  pages[id]?.();
}

// ─── DASHBOARD ───
function renderDashboard(){
  const el=document.getElementById('page-dashboard');
  const spend=thisMonthSpend(), income=thisMonthIncome();
  const bank=db.accounts.reduce((s,a)=>s+a.balance,0);
  const subTotal=db.subscriptions.filter(s=>s.active).reduce((s,sub)=>s+sub.amount,0);
  const recent=[...db.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  el.innerHTML=`
  <div class="page-header">
    <div><div class="page-title">財務總覽</div><div class="page-sub">${today()}</div></div>
    <button class="btn-primary btn-sm" onclick="openAddTx()">＋ 記帳</button>
  </div>

  <div class="kpi-row">
    <div class="kpi full green">
      <div class="kpi-label">銀行 + 現金</div>
      <div class="kpi-value mono">${fmt(bank)}</div>
      <div class="kpi-sub">所有帳戶合計</div>
    </div>
  </div>
  <div class="kpi-row">
    <div class="kpi red">
      <div class="kpi-label">本月支出</div>
      <div class="kpi-value mono" style="color:var(--red)">${fmt(spend)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">本月收入</div>
      <div class="kpi-value mono" style="color:var(--green)">${fmt(income)}</div>
    </div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:16px">
    ${db.creditCards.map(cc=>{
      const used=ccUsed(cc.id), pct=Math.min(100,used/cc.limit*100);
      const barCls=pct>80?'over':pct>60?'warn':'';
      return `<div class="kpi" style="flex:1;border-color:${cc.color}33">
        <div class="kpi-label">${esc(cc.name)}</div>
        <div class="mono" style="font-size:16px;font-weight:700;color:var(--red)">${fmtFull(used)}</div>
        <div class="cc-bar-bg"><div class="cc-bar ${barCls}" style="width:${pct}%;background:${cc.color}"></div></div>
        <div style="font-size:11px;color:var(--text3)">結帳 ${daysUntil(cc.billingDay)}天後</div>
      </div>`;
    }).join('')}
  </div>

  <div class="sec-hd">最近記帳</div>
  <div class="tx-list">
    ${recent.length?recent.map(txRowHtml).join(''):'<div style="text-align:center;padding:24px;color:var(--text3)">還沒有記帳記錄</div>'}
  </div>
  ${recent.length?`<button class="btn" style="width:100%;margin-top:10px" onclick="goto('tx')">查看全部 →</button>`:''}`;
}

function txRowHtml(tx){
  const cat=db.categories[tx.category]||{icon:'📌'};
  const acc=tx.accId?db.accounts.find(a=>a.id===tx.accId):null;

// TX
let txEditId=null, txType='expense';
function openAddTx(){
  txEditId=null; txType='expense';
  document.getElementById('txModalTitle').textContent='新增記帳';
  document.getElementById('txDate').value=today();
  document.getElementById('txAmount').value='';
  document.getElementById('txNote').value='';
  document.getElementById('txDeleteBtn').style.display='none';
  setTxType('expense');
  populateTxSelects();
  openModal('txOverlay');
}
function openEditTx(id){
  const tx=db.transactions.find(t=>t.id===id); if(!tx)return;
  txEditId=id; txType=tx.amount>0?'income':'expense';
  document.getElementById('txModalTitle').textContent='編輯記帳';
  document.getElementById('txDate').value=tx.date;
  document.getElementById('txAmount').value=Math.abs(tx.amount);
  document.getElementById('txNote').value=tx.note||'';
  document.getElementById('txDeleteBtn').style.display='block';
  document.getElementById('txEditId').value=id;
  setTxType(txType);
  populateTxSelects(tx.category, tx.accId, tx.ccId);
  openModal('txOverlay');
}
function setTxType(type){
  txType=type;
  const e=document.getElementById('txTypeExpense'), i=document.getElementById('txTypeIncome');
  if(type==='expense'){
    e.style.background='var(--red-bg)'; e.style.color='var(--red)'; e.style.borderColor='rgba(208,48,96,.3)';
    i.style.background='var(--card2)'; i.style.color='var(--text2)'; i.style.borderColor='var(--border2)';
  } else {
    i.style.background='var(--green-bg)'; i.style.color='var(--green)'; i.style.borderColor='rgba(10,138,104,.3)';
    e.style.background='var(--card2)'; e.style.color='var(--text2)'; e.style.borderColor='var(--border2)';
  }
  populateTxSelects();
}
function populateTxSelects(selCat, selAccId, selCcId){
  const catEl=document.getElementById('txCategory');
  const cats=Object.keys(db.categories);
  catEl.innerHTML=cats.map(c=>`<option value="${c}"${c===(selCat||cats[0])?' selected':''}>${db.categories[c].icon} ${c}</option>`).join('');
  updateSubcats(selCat);
  const payEl=document.getElementById('txPay');
  payEl.innerHTML=[
    ...db.accounts.map(a=>`<option value="acc:${a.id}"${selAccId===a.id?' selected':''}>${a.icon} ${a.name}</option>`),
    ...db.creditCards.map(c=>`<option value="cc:${c.id}"${selCcId===c.id?' selected':''}>${c.name}</option>`),
  ].join('');
}
function updateSubcats(cat){
  const c=cat||document.getElementById('txCategory').value;
  const subs=db.categories[c]?.subs||[];
  const el=document.getElementById('txSubcat');
  el.innerHTML=subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('txSubcatFg').style.display=subs.length?'block':'none';
}
function saveTx(){
  const amt=parseFloat(document.getElementById('txAmount').value);
  const date=document.getElementById('txDate').value;
  const cat=document.getElementById('txCategory').value;
  const sub=document.getElementById('txSubcat').value;
  const note=document.getElementById('txNote').value.trim();
  const pay=document.getElementById('txPay').value;
  if(!date||isNaN(amt)){toast('請填寫日期和金額');return;}
  const [payType,payId]=pay.split(':');
  const amount=txType==='expense'?-Math.abs(amt):Math.abs(amt);
  const tx={id:txEditId||uid(),date,amount,category:cat,subcategory:sub,note,type:txType,accId:payType==='acc'?payId:null,ccId:payType==='cc'?payId:null};
  if(txEditId){const i=db.transactions.findIndex(t=>t.id===txEditId);db.transactions[i]=tx;}
  else db.transactions.unshift(tx);
  save();closeModal('txOverlay');renderPage(activePage);toast('✓ 已儲存');
}
function deleteTx(){
  const id=document.getElementById('txEditId').value;
  confirmAction('刪除這筆記帳？',()=>{
    db.transactions=db.transactions.filter(t=>t.id!==id);
    save();closeModal('txOverlay');renderPage(activePage);toast('已刪除');
  });
}

function openAddCategory(){
  showGenericModal('新增分類',`

    <div class="fg"><label>圖示</label><input type="text" id="catIcon" value="📦"></div>
  `,()=>{

    if(!name){toast('請填寫名稱');return;}
    db.categories[name]={icon:document.getElementById('catIcon').value||'📦',subs:[]};

}
function editCategory(name){
  const c=db.categories[name]; if(!c)return;
  showGenericModal(`編輯分類：${name}`,`
    <div class="fg"><label>圖示</label><input type="text" id="catIcon" value="${c.icon}"></div>
    <div class="fg"><label>子分類（每行一個）</label><textarea id="catSubs">${(c.subs||[]).join('\n')}</textarea></div>
    <button class="btn btn-red" style="width:100%;margin-top:4px" onclick="deleteCategory('${name}')">刪除分類</button>
  `,()=>{
    c.icon=document.getElementById('catIcon').value||c.icon;
    c.subs=document.getElementById('catSubs').value.split('\n').map(s=>s.trim()).filter(Boolean);
    save();closeGenericModal();renderSettings();toast('✓ 已儲存');
  });

function deleteCategory(name){ confirmAction(`刪除「${name}」分類？`,()=>{ delete db.categories[name];save();closeGenericModal();renderSettings(); }); }

// Export/Import
function exportJSON(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`finance-backup-${today()}.json`;a.click();
}
function importJSON(input){
  const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{db=JSON.parse(e.target.result);save();renderPage(activePage);toast('✓ 已還原備份');}catch{toast('❌ 檔案格式錯誤');}};
  r.readAsText(file);
}
function clearAll(){ localStorage.removeItem(KEY);location.reload(); }

// ═══════════════════════════
// GENERIC MODAL
// ═══════════════════════════
let _genericOk=null;
function showGenericModal(title, bodyHtml, onOk){
  _genericOk=onOk;
  let el=document.getElementById('_gModal');
  if(!el){
    el=document.createElement('div');el.id='_gModal';el.className='overlay';
    el.innerHTML='<div class="modal"><div class="modal-handle"></div><div class="modal-title" id="_gTitle"></div><div id="_gBody"></div><div class="modal-footer"><button class="btn" onclick="closeGenericModal()">取消</button><button class="btn-primary" onclick="if(_genericOk)_genericOk()">儲存</button></div></div>';
    document.body.appendChild(el);
    el.onclick=e=>{if(e.target===el)closeGenericModal();};
  }
  document.getElementById('_gTitle').textContent=title;
  document.getElementById('_gBody').innerHTML=bodyHtml;
  el.classList.add('open');
}
function closeGenericModal(){ const el=document.getElementById('_gModal');if(el)el.classList.remove('open'); }

// ═══════════════════════════
// CONFIRM
// ═══════════════════════════
let _confirmFn=null;
function confirmAction(msg, fn){
  _confirmFn=fn;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOkBtn').onclick=()=>{closeModal('confirmOverlay');if(_confirmFn)_confirmFn();};
  openModal('confirmOverlay');
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
renderDashboard();
