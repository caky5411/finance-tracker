<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>記帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa;--bg2:#eef0f6;--bg3:#e4e7f0;--card:#ffffff;--card2:#f0f2f8;
  --border:#d8dce8;--border2:#c8cdde;
  --text:#1a1d2e;--text2:#4a5068;--text3:#9098b8;
  --accent:#7c6af0;--accent2:#6254d0;
  --green:#0f9b6a;--green-bg:#e6f7f2;
  --red:#e03c3c;--red-bg:#fdf0f0;
  --amber:#c47a00;--amber-bg:#fdf6e6;
  --blue:#2563eb;--blue-bg:#eff4ff;
  --pink:#c2286a;
  --r:10px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
input,select,textarea{font-family:'Space Grotesk',sans-serif;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;transition:border .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:64px;}
button{font-family:'Space Grotesk',sans-serif;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;}
.btn{padding:9px 16px;background:var(--card2);color:var(--text);border:1px solid var(--border2);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{padding:10px 20px;background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.mono{font-family:'JetBrains Mono',monospace;}
label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:5px;}
.fg{margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-red{background:var(--red-bg);color:var(--red);}
.tag-amber{background:var(--amber-bg);color:var(--amber);}
.tag-blue{background:var(--blue-bg);color:var(--blue);}
.tag-purple{background:#1e1830;color:var(--accent2);}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.sidebar-logo-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:2px;}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:2px;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;text-align:left;border:none;cursor:pointer;transition:all .15s;}
.nav-btn:hover{background:var(--bg3);color:var(--text);}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:700;}
.nav-btn .ni{font-size:15px;opacity:.8;}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page{flex:1;overflow-y:auto;padding:24px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}

/* Bottom nav mobile */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--bg2);border-top:1px solid var(--border);z-index:50;overflow-x:auto;}
.mobile-nav-inner{display:flex;height:100%;min-width:max-content;width:100%;}
.mobile-nav-btn{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 8px;font-family:'Space Grotesk',sans-serif;}
.mobile-nav-btn.active{color:var(--accent);}
.mobile-nav-btn .mni{font-size:18px;}
.mobile-nav-btn .mnl{font-size:9px;font-weight:600;}

/* Dashboard */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.kpi.green{border-color:var(--green);background:var(--green-bg);}
.kpi.red{border-color:var(--red);}
.kpi.amber{border-color:var(--amber);}

/* CC cards */
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.cc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.cc-name{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cc-bar-bg{height:6px;background:var(--bg3);border-radius:3px;margin:8px 0;}
.cc-bar{height:6px;border-radius:3px;background:var(--accent);transition:width .3s;}
.cc-bar.warn{background:var(--amber);}
.cc-bar.danger{background:var(--red);}
.cc-meta{font-size:11px;color:var(--text3);}

/* Transaction list */
.tx-list{display:flex;flex-direction:column;gap:2px;}
.tx-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border .15s;}
.tx-row:hover{border-color:var(--border2);}
.tx-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.tx-amount{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0;}
.tx-amount.neg{color:var(--red);}
.tx-amount.pos{color:var(--green);}

/* Plan list */
.plan-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;background:var(--card);border:1px solid var(--border);margin-bottom:6px;}
.plan-done{border-color:var(--border);opacity:.5;}
.plan-info{flex:1;min-width:0;}
.plan-name{font-size:13px;font-weight:600;}
.plan-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.plan-amount{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--amber);}

/* Sub list */
.sub-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}

/* Pet */
.pet-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.pet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pet-total{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}

/* Income */
.income-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Category mgr */
.cat-list{display:flex;flex-direction:column;gap:4px;}
.cat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;}
.cat-item:hover{background:var(--bg3);}
.cat-item.active{background:var(--accent);}
.cat-item.active span{color:#fff;}

/* Salary */
.shift-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* RWD */
@media(max-width:640px){
  .sidebar{display:none;}
  .mobile-nav{display:block;}
  .page{padding:14px;padding-bottom:70px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .cc-grid{grid-template-columns:1fr;}
  .grid2{grid-template-columns:1fr;}
  .overlay{padding:0;align-items:flex-end;}
  .modal{border-radius:16px 16px 0 0;max-width:100%;max-height:90vh;}
  .modal-mobile-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">💴 記帳本</div>
      <div class="sidebar-logo-sub">KACHE TRACKER</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">本機</span>
      <button class="btn btn-sm" onclick="manualSave()" style="margin-left:auto;padding:3px 10px;font-size:11px;">💾</button>
    </div>
  </div>
  <div class="main">
    <div class="page" id="pageContent"></div>
  </div>
</div>
<nav class="mobile-nav"><div class="mobile-nav-inner" id="mobileNav"></div></nav>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbx-ym082RQNCcWMJarOTnmlLyyJKNpT6VE3YZUfGCG0yqVU74WzcfLYEf_n8AQIP4Zg/exec';

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const STORAGE_KEY = 'kache_v1';
const defDB = {
  _updatedAt: '',
  accounts: [
    {id:'acc1', name:'銀行帳戶', balance:30000, icon:'🏦'},
    {id:'acc2', name:'現金', balance:2000, icon:'💵'},
  ],
  creditCards: [
    {id:'cc1', name:'玉山卡', limit:50000, used:0, billingDay:25, payDay:15, color:'#7c6af0'},
    {id:'cc2', name:'國泰卡', limit:30000, used:0, billingDay:20, payDay:10, color:'#2dd4a0'},
  ],
  transactions: [],
  subscriptions: [
    {id:'sub1', name:'Netflix', amount:270, day:15, ccId:'cc1', category:'娛樂', active:true},
  ],
  plans: [],       // 計劃支出
  shifts: [],      // 打卡/時數記錄
  incomes: [],     // 薪水/其他收入
  pets: [
    {id:'pet1', name:'貓貓', icon:'🐱'},
  ],
  categories: [
    {id:'cat1', name:'餐飲', icon:'🍜'},
    {id:'cat2', name:'機車', icon:'🛵'},
    {id:'cat3', name:'購物', icon:'🛍️'},
    {id:'cat4', name:'BL小說', icon:'📚'},
    {id:'cat5', name:'學校', icon:'🎓'},
    {id:'cat6', name:'寵物', icon:'🐾'},
    {id:'cat7', name:'娛樂', icon:'🎮'},
    {id:'cat8', name:'醫療', icon:'💊'},
    {id:'cat9', name:'其他', icon:'📌'},
  ],
  settings: {
    hourlyRate: 180,
    currency: 'NT$',
  }
};

let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || JSON.parse(JSON.stringify(defDB));

function saveDB(){
  db._updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

// ═══════════════════════════════════════════
// SYNC
// ═══════════════════════════════════════════
function setSyncDot(state){
  const d = document.getElementById('syncDot');
  const l = document.getElementById('syncLabel');
  d.className = 'sync-dot ' + state;
  if(state==='ok') l.textContent='已同步';
  else if(state==='err') l.textContent='同步失敗';
  else if(state==='loading') l.textContent='同步中...';
  else l.textContent='本機';
}
async function pushAll(){
  if(!API_URL) return;
  setSyncDot('loading');
  try{
    const resp = await fetch(API_URL, {
      method:'POST',
      body: JSON.stringify({action:'saveAll', data: db})
    });
    const r = await resp.json();
    if(r.ok) setSyncDot('ok'); else throw new Error(r.error);
  }catch(e){ setSyncDot('err'); console.warn('push error',e); throw e; }
}
async function pullAll(){
  if(!API_URL) return;
  setSyncDot('loading');
  try{
    const url = API_URL + '?action=getAll&callback=_cb&t=' + Date.now();
    const data = await new Promise((res,rej)=>{
      const cb = '_jsonp_' + Date.now();
      window[cb] = d => { delete window[cb]; res(d); };
      const s = document.createElement('script');
      s.src = API_URL + '?action=getAll&callback=' + cb + '&t=' + Date.now();
      s.onerror = () => rej(new Error('network error'));
      document.head.appendChild(s);
      setTimeout(()=>rej(new Error('timeout')),15000);
    });
    if(data && !data.error){
      Object.assign(db, data);
      saveDB(); renderAll();
      setSyncDot('ok');
      toast('✓ 已從雲端載入');
    }
  }catch(e){ setSyncDot('err'); toast('拉取失敗'); }
}
function manualSave(){
  saveDB();
  pushAll().then(()=>toast('✅ 已存檔到雲端')).catch(()=>toast('❌ 存檔失敗'));
}

// Auto push every 10min
setInterval(()=>{ if(API_URL && db.transactions.length) pushAll(); }, 600000);

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const fmt = n => {
  const a = Math.abs(n);
  const s = a >= 10000 ? (a/10000).toFixed(1)+'萬' : a.toLocaleString();
  return (n<0?'-':'')+'NT$'+s;
};
const fmtFull = n => (n<0?'-NT$':'NT$') + Math.abs(n).toLocaleString();
const today = () => new Date().toISOString().slice(0,10);
const uid = () => '_' + Math.random().toString(36).slice(2,9);
const monthStr = d => d.slice(0,7);
const curMonth = () => today().slice(0,7);

function toast(msg, dur=2500){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function getCat(id){ return db.categories.find(c=>c.id===id)||{name:'其他',icon:'📌'}; }
function getCC(id){ return db.creditCards.find(c=>c.id===id); }
function getAcc(id){ return db.accounts.find(a=>a.id===id); }
function getPet(id){ return db.pets.find(p=>p.id===id); }

// Credit card current cycle used
function ccUsed(ccId){
  const cc = getCC(ccId); if(!cc) return 0;
  const t = new Date();
  const billingDay = cc.billingDay;
  // Current cycle: from last billing day to today
  let cycleStart = new Date(t.getFullYear(), t.getMonth(), billingDay);
  if(t.getDate() < billingDay) cycleStart = new Date(t.getFullYear(), t.getMonth()-1, billingDay);
  return db.transactions
    .filter(tx => tx.ccId===ccId && tx.amount<0 && new Date(tx.date)>=cycleStart)
    .reduce((s,tx)=>s+Math.abs(tx.amount),0);
}
function daysUntil(dayOfMonth){
  const t = new Date();
  let target = new Date(t.getFullYear(), t.getMonth(), dayOfMonth);
  if(target <= t) target = new Date(t.getFullYear(), t.getMonth()+1, dayOfMonth);
  return Math.ceil((target - t)/(1000*60*60*24));
}

// Safe balance = bank - plans not done
function safeBalance(){
  const bank = db.accounts.reduce((s,a)=>s+a.balance,0);
  const pendingPlans = db.plans.filter(p=>!p.done && new Date(p.date)>=new Date())
    .reduce((s,p)=>s+p.amount,0);
  return bank - pendingPlans;
}

// Monthly subscription total
function monthlySubTotal(){
  return db.subscriptions.filter(s=>s.active).reduce((s,sub)=>s+sub.amount,0);
}

// This month tx
function thisMonthTx(){ return db.transactions.filter(tx=>tx.date.startsWith(curMonth())); }
function thisMonthSpend(){ return thisMonthTx().filter(tx=>tx.amount<0).reduce((s,tx)=>s+Math.abs(tx.amount),0); }
function thisMonthIncome(){ return db.incomes.filter(i=>i.date.startsWith(curMonth())).reduce((s,i)=>s+i.amount,0); }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const NAV = [
  {id:'dashboard', icon:'◈', label:'總覽'},
  {id:'add', icon:'＋', label:'記帳', accent:true},
  {id:'transactions', icon:'≡', label:'明細'},
  {id:'cards', icon:'▣', label:'信用卡'},
  {id:'plans', icon:'◷', label:'計劃支出'},
  {id:'subscriptions', icon:'⊛', label:'訂閱'},
  {id:'pet', icon:'🐾', label:'寵物'},
  {id:'income', icon:'↑', label:'收入'},
  {id:'accounts', icon:'◉', label:'帳戶'},
  {id:'categories', icon:'⊞', label:'分類'},
  {id:'settings', icon:'⚙', label:'設定'},
];
let activeTab = 'dashboard';

function renderNav(){
  const sn = document.getElementById('sidebarNav');
  const mn = document.getElementById('mobileNav');
  sn.innerHTML = NAV.map(n=>`
    <button class="nav-btn${activeTab===n.id?' active':''}" onclick="goto('${n.id}')">
      <span class="ni">${n.icon}</span>${n.label}
    </button>`).join('');
  mn.innerHTML = NAV.map(n=>`
    <button class="mobile-nav-btn${activeTab===n.id?' active':''}" onclick="goto('${n.id}')">
      <span class="mni">${n.icon}</span>
      <span class="mnl">${n.label}</span>
    </button>`).join('');
}
function goto(tab){
  if(tab==='add'){ openAddTx(); return; }
  activeTab = tab;
  renderAll();
}
function renderAll(){ renderNav(); renderPage(); }

// ═══════════════════════════════════════════
// PAGES
// ═══════════════════════════════════════════
function renderPage(){
  const el = document.getElementById('pageContent');
  switch(activeTab){
    case 'dashboard': el.innerHTML = pageDashboard(); break;
    case 'transactions': el.innerHTML = pageTx(); break;
    case 'cards': el.innerHTML = pageCards(); break;
    case 'plans': el.innerHTML = pagePlans(); break;
    case 'subscriptions': el.innerHTML = pageSubs(); break;
    case 'pet': el.innerHTML = pagePet(); break;
    case 'income': el.innerHTML = pageIncome(); break;
    case 'accounts': el.innerHTML = pageAccounts(); break;
    case 'categories': el.innerHTML = pageCategories(); break;
    case 'settings': el.innerHTML = pageSettings(); break;
    default: el.innerHTML = pageDashboard();
  }
}

// ─── DASHBOARD ───
function pageDashboard(){
  const bank = db.accounts.reduce((s,a)=>s+a.balance,0);
  const safe = safeBalance();
  const spent = thisMonthSpend();
  const income = thisMonthIncome();
  const subTotal = monthlySubTotal();
  const pendingPlans = db.plans.filter(p=>!p.done&&new Date(p.date)>=new Date());

  const recentTx = [...db.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  return `
  <div class="page-header">
    <div><div class="page-title">總覽</div><div class="page-sub">${today()}</div></div>
    <button class="btn btn-sm" onclick="manualSave()">💾 存檔</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi${safe<0?' red':safe<5000?' amber':' green'}">
      <div class="kpi-label">安全餘額</div>
      <div class="kpi-value mono">${fmt(safe)}</div>
      <div class="kpi-sub">扣除計劃支出後</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">銀行+現金</div>
      <div class="kpi-value mono">${fmt(bank)}</div>
      <div class="kpi-sub">帳戶總計</div>
    </div>

function txRow(tx){
  const cat = getCat(tx.catId);
  const isPet = tx.petId;
  const pet = isPet ? getPet(tx.petId) : null;
  const label = tx.note || cat.name;
  const acc = tx.accId ? getAcc(tx.accId) : null;
  const cc = tx.ccId ? getCC(tx.ccId) : null;
  const payVia = cc ? cc.name : (acc ? acc.name : '');
  return `<div class="tx-row" onclick="editTx('${tx.id}')">
    <div class="tx-icon" style="background:var(--bg3)">${isPet?(pet?.icon||'🐾'):cat.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${label}${isPet&&pet?` <span style="font-size:11px;color:var(--text3)">(${pet.name})</span>`:''}</div>
      <div class="tx-meta">${tx.date} &nbsp;${payVia} &nbsp;${cat.name}${tx.isPetSurprise?' <span class="tag tag-amber">意外</span>':''}</div>
    </div>
    <div class="tx-amount ${tx.amount<0?'neg':'pos'}">${tx.amount<0?'-':'+'} ${fmtFull(Math.abs(tx.amount))}</div>
  </div>`;
}

function showModal(html){
  let el = document.getElementById('modalEl');
  if(!el){ el = document.createElement('div'); el.id='modalEl'; el.className='overlay'; document.body.appendChild(el); }
  el.innerHTML = `<div class="modal"><div class="modal-mobile-handle"></div>${html}</div>`;
  el.style.display='flex';
  el.onclick = e => { if(e.target===el) closeModal(); };
}
function closeModal(){ const el=document.getElementById('modalEl'); if(el) el.style.display='none'; }

  showModal(`

      <input type="number" id="txAmt" placeholder="-500" value="${tx?.amount||''}">
    </div>
    <div class="fg">
      <label>分類</label>
      <select id="txCat">
        ${db.categories.map(c=>`<option value="${c.id}"${tx?.catId===c.id?' selected':''}>${c.icon} ${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="fg">

      </select>
    </div>
    <div class="fg" id="petFields" style="display:${tx?.petId||petCat&&!tx?'block':'none'}">

        ${db.pets.map(p=>`<option value="${p.id}"${tx?.petId===p.id?' selected':''}>${p.icon} ${p.name}</option>`).join('')}
      </select>
      <div style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="txSurprise" ${tx?.isPetSurprise?'checked':''}> 意外支出
        </label>
      </div>
    </div>
    <div class="fg">
      <label>備注</label>
      <input type="text" id="txNote" placeholder="說明..." value="${tx?.note||''}">
    </div>
    <div class="modal-footer">
      ${tx?`<button class="btn btn-sm btn-danger" onclick="deleteTx('${tx.id}')">刪除</button>`:''}
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveTx('${txId||''}')">儲存</button>
    </div>`);
}
function togglePetFields(){
  const pay = document.getElementById('txPay')?.value;
  const cat = document.getElementById('txCat')?.value;
  const petCat = db.categories.find(c=>c.name==='寵物');
  const el = document.getElementById('petFields');
  if(el) el.style.display = (petCat && cat===petCat.id) ? 'block' : (document.getElementById('txPet')?.value ? 'block' : 'none');
}
function saveTx(txId){
  const date = document.getElementById('txDate').value;
  const amount = parseFloat(document.getElementById('txAmt').value);
  const catId = document.getElementById('txCat').value;
  const pay = document.getElementById('txPay').value;
  const petId = document.getElementById('txPet')?.value||'';
  const isPetSurprise = document.getElementById('txSurprise')?.checked||false;
  const note = document.getElementById('txNote').value.trim();
  if(!date||isNaN(amount)){ toast('請填寫日期和金額'); return; }
  const [payType, payId] = pay.split(':');
  const tx = {
    id: txId||uid(), date, amount, catId, note, petId:petId||null, isPetSurprise,
    accId: payType==='acc'?payId:null,
    ccId: payType==='cc'?payId:null,
  };
  if(txId){ const i=db.transactions.findIndex(t=>t.id===txId); db.transactions[i]=tx; }
  else db.transactions.unshift(tx);
  saveDB(); closeModal(); renderPage(); toast('✓ 已儲存');
}
function editTx(id){ openAddTx(id); }
function deleteTx(id){ if(confirm('刪除這筆記錄？')){ db.transactions=db.transactions.filter(t=>t.id!==id); saveDB(); closeModal(); renderPage(); toast('已刪除'); } }
